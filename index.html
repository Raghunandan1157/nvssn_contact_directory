<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0b1020" />
<title>NVSSN Directory</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">NV</span>
      <div class="title">
        <h1>NVSSN Directory</h1>
        <p class="sub" id="meta">Loading…</p>
      </div>
    </div>
  </header>

  <div class="search-wrap">
    <div class="search-box">
      <svg class="ic" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M10 18a8 8 0 1 1 5.3-14A8 8 0 0 1 10 18Zm11.7 2.3-4.4-4.4a10 10 0 1 0-1.4 1.4l4.4 4.4a1 1 0 0 0 1.4-1.4Z"/></svg>
      <input id="search" type="search" placeholder="Search name, ID, phone…" autocomplete="off" inputmode="search" />
      <button id="clearSearch" class="x-btn" aria-label="Clear search" type="button">&times;</button>
    </div>
    <button id="filterToggle" class="filter-btn" type="button" aria-expanded="false">
      <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M3 5h18v2H3zm3 6h12v2H6zm4 6h4v2h-4z"/></svg>
      <span>Filters</span>
      <span id="activeCount" class="badge hidden">0</span>
    </button>
  </div>

  <section id="filterPanel" class="filter-panel hidden">
    <label>Department<select id="dept"><option value="">All</option></select></label>
    <label>Location<select id="loc"><option value="">All</option></select></label>
    <label>Manager<select id="mgr"><option value="">All</option></select></label>
    <label>Designation<select id="desg"><option value="">All</option></select></label>
    <button id="clearBtn" class="btn ghost full" type="button">Clear all</button>
  </section>

  <p id="resultCount" class="result-count"></p>

  <main id="grid" class="list" aria-live="polite"></main>

  <div id="empty" class="empty hidden">
    <div class="empty-emoji">🔎</div>
    <p>No matches. Try a different search.</p>
  </div>

  <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-card">
      <button class="modal-close" id="modalClose" aria-label="Close">&times;</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
